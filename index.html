<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Renzie’s Fairy Eggs</title><style>body{font-family:sans-serif;margin:0;background:#f7f8f5}header{padding:14px;background:linear-gradient(90deg,#c7b9e2,#f2c2d1);font-weight:700;text-align:center}nav{display:flex;background:#fff6b3}nav button{flex:1;padding:10px;border:none;background:#6f7f45;color:#fff}section{display:none;padding:12px}section.active{display:block}.card{background:#fff;border-radius:10px;padding:10px;margin-bottom:10px}input,select,button{width:100%;padding:8px;margin:5px 0}</style></head><body><header>Renzie’s Fairy Eggs</header><nav><button onclick="show('dash')">Today</button><button onclick="show('cust')">Customers</button><button onclick="show('prod')">Products</button><button onclick="show('orders')">Orders</button><button onclick="show('reports')">Reports</button></nav><section id='dash' class='active'><div class='card' id='stats'></div></section><section id='cust'><div class='card'><input id='cname' placeholder='Name'><select id='ctype'><option>retail</option><option>wholesale</option></select><button onclick='addCustomer()'>Add</button></div><div class='card' id='clist'></div></section><section id='prod'><div class='card'><input id='pname' placeholder='Product'><input id='pqty' type='number' placeholder='Qty'><button onclick='addProduct()'>Add</button></div><div class='card' id='plist'></div></section><section id='orders'><div class='card'><select id='ocust'></select><select id='oprod'></select><input id='oqty' type='number'><input id='omiles' type='number' placeholder='Miles'><button onclick='addOrder()'>Create</button></div><div class='card' id='olist'></div></section><section id='reports'><div class='card'><button onclick='exportData()'>Export JSON</button><button onclick='printInv()'>Print Inventory</button><pre id='dump'></pre></div></section><script>let db=JSON.parse(localStorage.getItem('fe'))||{customers:[],products:[],orders:[]};function save(){localStorage.setItem('fe',JSON.stringify(db))}function show(id){document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');render()}function addCustomer(){if(!cname.value)return;db.customers.push({name:cname.value,type:ctype.value});cname.value='';save();render()}function addProduct(){if(!pname.value)return;db.products.push({name:pname.value,qty:+pqty.value||0});pname.value='';pqty.value='';save();render()}function addOrder(){let p=db.products.find(x=>x.name==oprod.value);let q=+oqty.value;if(!p||p.qty<q)return alert('stock');let miles=+omiles.value||0;let total=q*5+(5+miles);p.qty-=q;db.orders.push({cust:ocust.value,prod:p.name,qty:q,total});save();render()}function render(){stats.innerHTML='Customers:'+db.customers.length+' | Products:'+db.products.length+' | Orders:'+db.orders.length;clist.innerHTML=db.customers.map(c=>c.name+'('+c.type+')').join('<br>');plist.innerHTML=db.products.map(p=>p.name+': '+p.qty).join('<br>');ocust.innerHTML=db.customers.map(c=>'<option>'+c.name+'</option>').join('');oprod.innerHTML=db.products.map(p=>'<option>'+p.name+'</option>').join('');olist.innerHTML=db.orders.map(o=>o.cust+' - '+o.prod+' x'+o.qty+' $'+o.total).join('<br>');dump.textContent=JSON.stringify(db,null,2)}function exportData(){let a=document.createElement('a');a.href='data:application/json,'+encodeURIComponent(JSON.stringify(db));a.download='backup.json';a.click()}function printInv(){let w=window.open('');w.document.write('<h1>Inventory</h1><pre>'+JSON.stringify(db.products,null,2)+'</pre>');w.print()}render();</script></body></html>
